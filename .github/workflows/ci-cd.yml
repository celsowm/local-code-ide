name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  QT_VERSION: 6.8.0
  QT_ARCH: win64_msvc2022_64
  QT_DIR: C:/Qt/6.8.0/msvc2022_64
  QT6_DIR: C:/Qt/6.8.0/msvc2022_64/lib/cmake/Qt6

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install WiX Toolset
      run: |
        dotnet tool install --global wix

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install aqtinstall ruff

    - name: Install Qt
      run: |
        python -m aqt install-qt windows desktop ${{ env.QT_VERSION }} ${{ env.QT_ARCH }} --modules qt5compat --outputdir C:\Qt

    - name: Fetch Bundled Language Packs (Windows)
      run: |
        python scripts/fetch-language-packs.py --root . --platform windows --clean

    - name: Validate Language Pack Manifest (Source)
      run: |
        python scripts/validate-language-packs.py --root . --platform windows --smoke-check --verify-payload

    - name: Configure CMake
      run: |
        cmake -S . -B build `
          -DCMAKE_PREFIX_PATH="${{ env.QT_DIR }}" `
          -DQt6_DIR="${{ env.QT6_DIR }}"

    - name: Build
      run: |
        cmake --build build --config Release

    - name: Lint
      run: |
        python setup.py lint

    - name: Deploy Qt
      run: |
        C:\Qt\${{ env.QT_VERSION }}\msvc2022_64\bin\windeployqt.exe build\Release\LocalCodeIDE.exe --release --no-translations

    - name: Copy Bundled Language Packs
      run: |
        New-Item -ItemType Directory -Force -Path build\Release\language-packs | Out-Null
        Copy-Item -Path resources\language-packs\* -Destination build\Release\language-packs -Recurse -Force
        Copy-Item -Path language-packs\* -Destination build\Release\language-packs -Recurse -Force

    - name: Validate Language Pack Manifest (Artifact)
      run: |
        python scripts/validate-language-packs.py --root . --runtime-root build/Release --platform windows --smoke-check --verify-payload

    - name: Build WiX Installer
      run: |
        $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"
        powershell -ExecutionPolicy Bypass -File installer/build-installer.ps1 -Version ${{ github.event.release.tag_name }}
      if: github.event_name == 'release' && github.event.action == 'published'

    - name: Upload Artifact (Portable)
      uses: actions/upload-artifact@v4
      with:
        name: LocalCodeIDE-portable
        path: build/Release/
        retention-days: 30

    - name: Upload Artifact (Installer)
      uses: actions/upload-artifact@v4
      with:
        name: LocalCodeIDE-installer
        path: build/installer/*.msi
        retention-days: 30
      if: github.event_name == 'release' && github.event.action == 'published'

  release:
    needs: build
    runs-on: windows-latest
    if: github.event_name == 'release' && github.event.action == 'published'

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install WiX Toolset
      run: |
        dotnet tool install --global wix

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install aqtinstall

    - name: Install Qt
      run: |
        python -m aqt install-qt windows desktop ${{ env.QT_VERSION }} ${{ env.QT_ARCH }} --modules qt5compat --outputdir C:\Qt

    - name: Fetch Bundled Language Packs (Windows)
      run: |
        python scripts/fetch-language-packs.py --root . --platform windows --clean

    - name: Validate Language Pack Manifest (Source)
      run: |
        python scripts/validate-language-packs.py --root . --platform windows --smoke-check --verify-payload

    - name: Build Release
      run: |
        cmake -S . -B build `
          -DCMAKE_PREFIX_PATH="${{ env.QT_DIR }}" `
          -DQt6_DIR="${{ env.QT6_DIR }}"
        cmake --build build --config Release

    - name: Deploy Qt
      run: |
        C:\Qt\${{ env.QT_VERSION }}\msvc2022_64\bin\windeployqt.exe build\Release\LocalCodeIDE.exe --release --no-translations

    - name: Copy Bundled Language Packs
      run: |
        New-Item -ItemType Directory -Force -Path build\Release\language-packs | Out-Null
        Copy-Item -Path resources\language-packs\* -Destination build\Release\language-packs -Recurse -Force
        Copy-Item -Path language-packs\* -Destination build\Release\language-packs -Recurse -Force

    - name: Validate Language Pack Manifest (Artifact)
      run: |
        python scripts/validate-language-packs.py --root . --runtime-root build/Release --platform windows --smoke-check --verify-payload

    - name: Build WiX Installer
      run: |
        $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"
        powershell -ExecutionPolicy Bypass -File installer/build-installer.ps1 -Version ${{ github.event.release.tag_name }}

    - name: Create ZIP (Portable)
      run: |
        Compress-Archive -Path build\Release\* -DestinationPath LocalCodeIDE-${{ github.event.release.tag_name }}-portable.zip -Force

    - name: Upload to Release (Portable)
      uses: softprops/action-gh-release@v2
      with:
        files: LocalCodeIDE-${{ github.event.release.tag_name }}-portable.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  bundle-linux-language-packs:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Linux dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y npm python3-venv qt6-declarative-dev-tools

    - name: Fetch Bundled Language Packs (Linux)
      run: |
        python scripts/fetch-language-packs.py --root . --platform linux --clean

    - name: Validate Language Pack Manifest (Linux Source)
      run: |
        python scripts/validate-language-packs.py --root . --platform linux --smoke-check --verify-payload

    - name: Upload Linux Language Pack Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LocalCodeIDE-language-packs-linux
        path: language-packs/linux/
        retention-days: 30

    - name: Upload to Release (Installer)
      uses: softprops/action-gh-release@v2
      with:
        files: build/installer/LocalCodeIDE-${{ github.event.release.tag_name }}.msi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Qt6 and build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake ninja-build npm python3-venv
        pip install aqtinstall
        python -m aqt install-qt linux desktop 6.8.0 gcc_64 --outputdir $HOME/Qt

    - name: Fetch Bundled Language Packs (Linux)
      run: |
        python scripts/fetch-language-packs.py --root . --platform linux --clean

    - name: Validate Language Pack Manifest (Source)
      run: |
        python scripts/validate-language-packs.py --root . --platform linux --smoke-check --verify-payload

    - name: Configure CMake
      run: |
        cmake -S . -B build -G Ninja \
          -DCMAKE_PREFIX_PATH=$HOME/Qt/6.8.0/gcc_64 \
          -DQt6_DIR=$HOME/Qt/6.8.0/gcc_64/lib/cmake/Qt6

    - name: Build
      run: |
        cmake --build build --parallel $(nproc)

    - name: Lint
      run: |
        python setup.py lint

    - name: Copy Bundled Language Packs
      run: |
        mkdir -p build/language-packs
        cp -r resources/language-packs/* build/language-packs/
        cp -r language-packs/* build/language-packs/ 2>/dev/null || true
        find build/language-packs/linux -name "*.sh" -exec chmod +x {} \; 2>/dev/null || true

    - name: Upload Artifact (Portable)
      uses: actions/upload-artifact@v4
      with:
        name: LocalCodeIDE-linux
        path: build/bin/LocalCodeIDE
        retention-days: 30

    - name: Upload Artifact (Language Packs)
      uses: actions/upload-artifact@v4
      with:
        name: LocalCodeIDE-linux-language-packs
        path: build/bin/language-packs/
        retention-days: 30

  build-linux-appimage:
    needs: build-linux
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Qt6 and build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake ninja-build npm python3-venv fuse libfuse2
        pip install aqtinstall
        python -m aqt install-qt linux desktop 6.8.0 gcc_64 --outputdir $HOME/Qt

    - name: Fetch Bundled Language Packs (Linux)
      run: |
        python scripts/fetch-language-packs.py --root . --platform linux --clean

    - name: Build Release
      run: |
        cmake -S . -B build -G Ninja \
          -DCMAKE_PREFIX_PATH=$HOME/Qt/6.8.0/gcc_64 \
          -DQt6_DIR=$HOME/Qt/6.8.0/gcc_64/lib/cmake/Qt6
        cmake --build build --parallel $(nproc)

    - name: Copy Bundled Language Packs
      run: |
        mkdir -p build/bin/language-packs
        cp -r resources/language-packs/* build/bin/language-packs/
        cp -r language-packs/* build/bin/language-packs/ 2>/dev/null || true
        find build/bin/language-packs/linux -name "*.sh" -exec chmod +x {} \; 2>/dev/null || true

    - name: Build AppImage
      run: |
        chmod +x scripts/build-appimage.sh
        bash scripts/build-appimage.sh ${{ github.event.release.tag_name }}

    - name: Upload to Release (AppImage)
      uses: softprops/action-gh-release@v2
      with:
        files: build/LocalCodeIDE-${{ github.event.release.tag_name }}.AppImage
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-linux:
    needs: build-linux
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Qt6 and build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake ninja-build npm python3-venv
        pip install aqtinstall
        python -m aqt install-qt linux desktop 6.8.0 gcc_64 --outputdir $HOME/Qt

    - name: Fetch Bundled Language Packs (Linux)
      run: |
        python scripts/fetch-language-packs.py --root . --platform linux --clean

    - name: Build Release
      run: |
        cmake -S . -B build -G Ninja \
          -DCMAKE_PREFIX_PATH=$HOME/Qt/6.8.0/gcc_64 \
          -DQt6_DIR=$HOME/Qt/6.8.0/gcc_64/lib/cmake/Qt6
        cmake --build build --parallel $(nproc)

    - name: Copy Bundled Language Packs
      run: |
        mkdir -p build/bin/language-packs
        cp -r resources/language-packs/* build/bin/language-packs/
        cp -r language-packs/* build/bin/language-packs/ 2>/dev/null || true
        find build/bin/language-packs/linux -name "*.sh" -exec chmod +x {} \; 2>/dev/null || true

    - name: Create TAR (Portable)
      run: |
        mkdir -p pkg/language-packs
        cp -r build/bin/language-packs/* pkg/language-packs/ 2>/dev/null || true
        cp -r build/bin/LocalCodeIDE pkg/
        tar czf LocalCodeIDE-${{ github.event.release.tag_name }}-linux-x86_64.tar.gz -C pkg .

    - name: Upload to Release (Portable TAR)
      uses: softprops/action-gh-release@v2
      with:
        files: LocalCodeIDE-${{ github.event.release.tag_name }}-linux-x86_64.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
