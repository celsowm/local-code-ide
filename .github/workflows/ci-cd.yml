name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  QT_VERSION: 6.8.0
  QT_PLATFORM: win64_msvc2022_64
  QT_ROOT: C:/Qt/6.8.0/win64_msvc2022_64
  QT6_DIR: C:/Qt/6.8.0/win64_msvc2022_64/lib/cmake/Qt6

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install WiX Toolset
      run: |
        dotnet tool install --global wix

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install aqtinstall ruff

    - name: Install Qt
      run: |
        python -m aqt install-qt windows desktop ${{ env.QT_VERSION }} ${{ env.QT_PLATFORM }} --modules qt5compat --outputdir C:\Qt

    - name: Configure CMake
      run: |
        cmake -S . -B build `
          -DCMAKE_PREFIX_PATH="${{ env.QT_ROOT }}" `
          -DQt6_DIR="${{ env.QT6_DIR }}"

    - name: Lint
      run: |
        python setup.py lint

    - name: Build
      run: |
        cmake --build build --config Release

    - name: Deploy Qt
      run: |
        C:\Qt\${{ env.QT_VERSION }}\${{ env.QT_PLATFORM }}\bin\windeployqt.exe build\Release\LocalCodeIDE.exe --release --no-translations

    - name: Build WiX Installer
      run: |
        $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"
        powershell -ExecutionPolicy Bypass -File installer/build-installer.ps1 -Version ${{ github.event.release.tag_name }}
      if: github.event_name == 'release' && github.event.action == 'published'

    - name: Upload Artifact (Portable)
      uses: actions/upload-artifact@v4
      with:
        name: LocalCodeIDE-portable
        path: build/Release/
        retention-days: 30

    - name: Upload Artifact (Installer)
      uses: actions/upload-artifact@v4
      with:
        name: LocalCodeIDE-installer
        path: build/installer/*.msi
        retention-days: 30
      if: github.event_name == 'release' && github.event.action == 'published'

  release:
    needs: build
    runs-on: windows-latest
    if: github.event_name == 'release' && github.event.action == 'published'

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install WiX Toolset
      run: |
        dotnet tool install --global wix

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install aqtinstall

    - name: Install Qt
      run: |
        python -m aqt install-qt windows desktop ${{ env.QT_VERSION }} ${{ env.QT_PLATFORM }} --modules qt5compat --outputdir C:\Qt

    - name: Build Release
      run: |
        cmake -S . -B build `
          -DCMAKE_PREFIX_PATH="${{ env.QT_ROOT }}" `
          -DQt6_DIR="${{ env.QT6_DIR }}"
        cmake --build build --config Release

    - name: Deploy Qt
      run: |
        C:\Qt\${{ env.QT_VERSION }}\${{ env.QT_PLATFORM }}\bin\windeployqt.exe build\Release\LocalCodeIDE.exe --release --no-translations

    - name: Build WiX Installer
      run: |
        $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"
        powershell -ExecutionPolicy Bypass -File installer/build-installer.ps1 -Version ${{ github.event.release.tag_name }}

    - name: Create ZIP (Portable)
      run: |
        Compress-Archive -Path build\Release\* -DestinationPath LocalCodeIDE-${{ github.event.release.tag_name }}-portable.zip -Force

    - name: Upload to Release (Portable)
      uses: softprops/action-gh-release@v2
      with:
        files: LocalCodeIDE-${{ github.event.release.tag_name }}-portable.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload to Release (Installer)
      uses: softprops/action-gh-release@v2
      with:
        files: build/installer/LocalCodeIDE-${{ github.event.release.tag_name }}.msi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
