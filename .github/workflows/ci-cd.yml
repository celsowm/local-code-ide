name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install aqtinstall

    - name: Install Qt
      run: |
        python -m aqt install-qt windows desktop 6.8.0 win64_msvc2022_64 --outputdir C:\Qt

    - name: Configure CMake
      run: |
        $env:CMAKE_PREFIX_PATH = "C:\Qt\6.8.0\msvc2022_64"
        $env:PATH = "C:\Qt\6.8.0\msvc2022_64\bin;$env:PATH"
        cmake -S . -B build

    - name: Build
      run: |
        $env:CMAKE_PREFIX_PATH = "C:\Qt\6.8.0\msvc2022_64"
        $env:PATH = "C:\Qt\6.8.0\msvc2022_64\bin;$env:PATH"
        cmake --build build --config Release

    - name: Deploy Qt
      run: |
        C:\Qt\6.8.0\msvc2022_64\bin\windeployqt.exe build\Release\LocalCodeIDE.exe --release --no-translations

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LocalCodeIDE
        path: build/Release/
        retention-days: 30

  release:
    needs: build
    runs-on: windows-latest
    if: github.event_name == 'release' && github.event.action == 'published'

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install aqtinstall

    - name: Install Qt
      run: |
        python -m aqt install-qt windows desktop 6.8.0 win64_msvc2022_64 --outputdir C:\Qt

    - name: Build Release
      run: |
        $env:CMAKE_PREFIX_PATH = "C:\Qt\6.8.0\msvc2022_64"
        $env:PATH = "C:\Qt\6.8.0\msvc2022_64\bin;$env:PATH"
        cmake -S . -B build
        cmake --build build --config Release

    - name: Deploy Qt
      run: |
        C:\Qt\6.8.0\msvc2022_64\bin\windeployqt.exe build\Release\LocalCodeIDE.exe --release --no-translations

    - name: Create ZIP
      run: |
        Compress-Archive -Path build\Release\* -DestinationPath LocalCodeIDE-${{ github.event.release.tag_name }}.zip -Force

    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        files: LocalCodeIDE-${{ github.event.release.tag_name }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
