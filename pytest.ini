[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    -ra
    --color=yes
markers =
    integration: Model detection and cache tests
    server: Server lifecycle tests (start, stop, health)
    inference: Chat completion and generation tests
    tools: Tool calling and function execution tests
    performance: Performance and stress tests
    requires_model: Requires Qwen3.5-0.8B model available
    slow: Slow running tests (>10 seconds)
